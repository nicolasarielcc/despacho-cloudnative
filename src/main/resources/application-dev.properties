# ============================================================
# PERFIL DEV — Desarrollo local con H2 en memoria
#
# Activar con:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#   java -jar app.jar --spring.profiles.active=dev
#
# Ventajas:
#   - No requiere Oracle Cloud instalado
#   - Datos en memoria (se pierden al reiniciar)
#   - H2 Console: http://localhost:8080/h2-console
# ============================================================

# --- H2 Database ---
spring.datasource.url=jdbc:h2:mem:transportistadb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# --- H2 Console (debug) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Seguridad desactivada (desarrollo) ---
app.security.enabled=false

# --- RabbitMQ (localhost por defecto) ---
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
