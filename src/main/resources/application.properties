# ============================================================
# APLICACIÓN — SISTEMA DE GESTIÓN DE CURSOS EN LÍNEA
# Asignatura: CDY2204 - Desarrollo Cloud Native
# Sumativa 3 — Semana 8
#
# CONFIGURACIÓN:
#   Los valores entre ${} se pueden setear como variables de
#   entorno del sistema operativo, argumentos de JVM o en
#   application.yml (NO escribir valores sensibles aquí).
#
#   Ejemplo con variable de entorno:
#     export ORACLE_USERNAME=admin
#     java -jar app.jar
#
#   Ejemplo con argumento:
#     java -jar app.jar --ORACLE_USERNAME=admin
# ============================================================
spring.application.name=cursosonline
server.port=8080

# ============================================================
# CONEXIÓN A ORACLE CLOUD (Base de Datos)
# IMPORTANTE: Reemplaza los valores de las variables de entorno
# con los datos de tu instancia Oracle Cloud (Autonomous DB o ATP)
#
# Obtenlos desde: Oracle Cloud → Autonomous Database → DB Connection
#
# Formato JDBC directo:
#   jdbc:oracle:thin:@<host>:<puerto>/<service_name>
#
# Si usas wallet (recomendado):
#   1. Descarga el wallet desde Oracle Cloud
#   2. Extrae los archivos en src/main/resources/wallet/
#   3. Usa la línea con TNS_ADMIN (está más abajo comentada)
# ============================================================
spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${ORACLE_USERNAME:admin}
spring.datasource.password=${ORACLE_PASSWORD:admin123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Si usas wallet de Oracle Cloud, descomenta estas 2 líneas y
# comenta la línea spring.datasource.url de arriba:
# spring.datasource.url=jdbc:oracle:thin:@${ORACLE_TNS_ALIAS}?TNS_ADMIN=${WALLET_PATH:src/main/resources/wallet}
# oracle.net.tns_admin=${WALLET_PATH:src/main/resources/wallet}

# ============================================================
# JPA / HIBERNATE
# ddl-auto=update: crea/actualiza tablas automáticamente al iniciar
# En producción cambiar a validate o none
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# RABBITMQ — Conexión al broker de mensajería
# IMPORTANTE:
#   - Desarrollo local: RABBITMQ_HOST=localhost
#   - Docker compose:   RABBITMQ_HOST=rabbitmq
#   - EC2 producción:   RABBITMQ_HOST=<IP pública EC2>
#
# Las credenciales por defecto son guest/guest
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Seguridad TLS para RabbitMQ (descomenta en producción)
# spring.rabbitmq.ssl.enabled=true
# spring.rabbitmq.ssl.key-store=${RABBITMQ_KEYSTORE:classpath:keystore.jks}
# spring.rabbitmq.ssl.key-store-password=${RABBITMQ_KEYSTORE_PASSWORD}
# spring.rabbitmq.ssl.trust-store=${RABBITMQ_TRUSTSTORE:classpath:truststore.jks}
# spring.rabbitmq.ssl.trust-store-password=${RABBITMQ_TRUSTSTORE_PASSWORD}

# ============================================================
# AZURE AD B2C — Autenticación y autorización JWT
# IMPORTANTE: Completa los valores desde tu tenant de Azure
#
# issuer-uri: Se obtiene de User Flows → Run user flow → jwt.ms
#             → campo "iss" en el token decodificado
#   Ejemplo: https://login.microsoftonline.com/duocazure.onmicrosoft.com/v2.0/
#
# jwk-set-uri: URI de las claves públicas de Azure para validar JWT
#   Se construye desde el issuer: {issuer}/discovery/v2.0/keys
#
# scope: Valor del scope expuesto en Azure AD B2C → Expose an API
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_ISSUER_URI:https://despachoservice2.b2clogin.com/5199d2b5-40ed-44c1-a8e5-f4a83132a743/v2.0/}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AZURE_JWKS_URI:https://despachoservice2.b2clogin.com/despachoservice2.onmicrosoft.com/discovery/v2.0/keys?p=B2C_1_despacho_signin}

# ============================================================
# AWS — Credenciales para S3 y otros servicios
# IMPORTANTE: Los valores vienen de AWS Academy (Learner Lab)
# Ruta: AWS Academy → Modules → Learner Lab → AWS Details → AWS CLI
#
# RECUERDA: Estos valores CAMBIAN cada vez que inicias el lab.
# Debes actualizarlos en cada nueva sesión.
# ============================================================
# cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
# cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
# cloud.aws.credentials.session-token=${AWS_SESSION_TOKEN}
# cloud.aws.region.static=${AWS_REGION:us-east-1}
# cloud.aws.s3.bucket-name=${S3_BUCKET_NAME}

# ============================================================
# CONTROL DE SEGURIDAD
# app.security.enabled=false  → modo prueba (sin JWT, ideal para desarrollo local)
# app.security.enabled=true   → modo producción (valida JWT con Azure AD B2C)
# ============================================================
app.security.enabled=${APP_SECURITY_ENABLED:false}

# ============================================================
# SPRING BOOT ACTUATOR — Monitoreo
# Expone endpoints de health, métricas, etc. para depuración
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always

# ============================================================
# LOGGING
# Nivel DEBUG para ver mensajes de RabbitMQ y seguridad
# En producción cambiar a INFO o WARN
# ============================================================
logging.level.com.transportista=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.amqp=${LOG_LEVEL_AMQP:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SEC:DEBUG}
