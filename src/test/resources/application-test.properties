# ============================================================
# PERFIL TEST — Propiedades para ejecución de tests
# Se activa automáticamente con @ActiveProfiles("test")
# en las clases de test
# ============================================================

# --- H2 en memoria para tests (sin Oracle) ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# --- Seguridad desactivada en tests ---
app.security.enabled=false

# --- RabbitMQ simulado (no se necesita broker real para tests unitarios) ---
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# AWS region falso (evita error de auto-configuración de S3 en tests)
spring.autoconfigure.exclude=io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration

# --- Azure AD — placeholders (no se validan en tests) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://test-tenant.onmicrosoft.com/v2.0/
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://test-tenant.onmicrosoft.com/discovery/v2.0/keys
