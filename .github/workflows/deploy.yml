name: CI/CD Pipeline - Transportista App

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar application.yml con credenciales AWS
        run: |
          cat > src/main/resources/application.yml << 'EOF'
          cloud:
            aws:
              credentials:
                access-key: ${{ secrets.AWS_ACCESS_KEY_ID }}
                secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                session-token: ${{ secrets.AWS_SESSION_TOKEN }}
              region:
                static: us-east-1
              s3:
                bucket-name: ${{ vars.S3_BUCKET_NAME || 'despacho-grupo3-bucket' }}
          EOF

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/transportista-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/transportista-app:latest

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Deploy en EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'REMOTE'
            set -e
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/transportista-app:latest

            docker stop transportista-producer transportista-consumer 2>/dev/null || true
            docker rm transportista-producer transportista-consumer 2>/dev/null || true

            docker run -d --name transportista-producer --network rabbitmq -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=dev \
              -e SPRING_RABBITMQ_HOST=rabbitmq \
              -e SPRING_RABBITMQ_PORT=5672 \
              -e SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP=false \
              -e APP_SECURITY_ENABLED=false \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/transportista-app:latest

            docker run -d --name transportista-consumer --network rabbitmq -p 8081:8081 \
              -e SERVER_PORT=8081 \
              -e SPRING_PROFILES_ACTIVE=dev \
              -e SPRING_RABBITMQ_HOST=rabbitmq \
              -e SPRING_RABBITMQ_PORT=5672 \
              -e APP_SECURITY_ENABLED=false \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/transportista-app:latest

            echo "=== DEPLOY OK ==="
          REMOTE
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Health check
        run: |
          sleep 15
          curl -sf http://${{ secrets.EC2_HOST }}:8080/actuator/health && echo "OK"
